<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moscow Incident Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse-marker { animation: pulse 2s infinite; background-color: #3b82f6; border-radius: 50%; }
        #map { height: 600px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <div id="notification-bar" class="hidden bg-blue-900/50 p-4 mb-4 border-b border-blue-700">
        <h2 class="text-lg font-bold flex items-center gap-2">
            <i class="fas fa-bell"></i> Свежие уведомления (последние 24ч)
        </h2>
        <div id="notification-content" class="text-sm mt-1"></div>
    </div>

    <div class="flex flex-col lg:flex-row h-screen">
        <div class="flex-1 p-2">
            <div id="map" class="rounded-xl shadow-2xl border border-slate-700"></div>
        </div>

        <div class="lg:w-1/3 p-4 overflow-y-auto bg-slate-800 border-l border-slate-700">
            <h2 class="text-xl font-bold mb-4">Прогнозные цели</h2>
            <div id="target-list" class="space-y-4"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const FALLBACK_DATA = { pastIncidents: [], forecastTargets: [] };
        const map = L.map('map').setView([55.7558, 37.6173], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function init() {
            let data;
            try {
                const response = await fetch('data.json');
                data = await response.json();
            } catch (e) { data = FALLBACK_DATA; }

            const now = new Date();
            const oneDay = 24 * 60 * 60 * 1000;

            data.pastIncidents.forEach(inc => {
                const incDate = new Date(inc.date);
                const isFresh = (now - incDate) < oneDay;
                
                const icon = L.divIcon({
                    className: isFresh ? 'pulse-marker' : '',
                    html: `<div class="w-4 h-4 rounded-full ${isFresh ? 'bg-blue-500' : 'bg-red-500'} border-2 border-white"></div>`
                });

                L.marker([inc.lat, inc.lng], { icon }).addTo(map).bindPopup(inc.description);
                
                if (isFresh) {
                    document.getElementById('notification-bar').classList.remove('hidden');
                    document.getElementById('notification-content').innerHTML += `<p>• ${inc.description}</p>`;
                }
            });

            data.forecastTargets.forEach(target => {
                L.circleMarker([target.lat, target.lng], { color: '#f97316', radius: 8 }).addTo(map).bindPopup(`Цель: ${target.description}`);
                document.getElementById('target-list').innerHTML += `
                    <div class="p-3 bg-slate-900 rounded border border-orange-500/30">
                        <h4 class="font-bold text-orange-400">${target.description}</h4>
                        <p class="text-xs text-slate-400">Дата: ${target.date}</p>
                    </div>`;
            });
        }
        init();
    </script>
</body>
</html>

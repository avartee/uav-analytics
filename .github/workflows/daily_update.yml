STREAMING_CHUNK:Defining workflow name and trigger

name: Daily Update Data

on:
schedule:
- cron: '0 6 * * *'
workflow_dispatch:

jobs:

STREAMING_CHUNK:Configuring the job environment

update-data:
runs-on: ubuntu-latest
permissions:
contents: write
steps:
# STREAMING_CHUNK:Checking out the repository
- uses: actions/checkout@v4

  # STREAMING_CHUNK:Setting up Python environment
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  # STREAMING_CHUNK:Running the data processing script
  - name: Run update script
    run: python update_data.py

  # STREAMING_CHUNK:Committing and pushing changes
  - name: Commit and push changes
    run: |
      git config --global user.name 'github-actions[bot]'
      git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      git add data.json
      git diff --quiet && git diff --staged --quiet || (git commit -m "Update data.json" && git push)

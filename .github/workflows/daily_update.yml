name: Daily Update Data

STREAMING_CHUNK:Configuring triggers for daily run and manual execution

on:
schedule:
- cron: '0 6 * * *'
workflow_dispatch:

jobs:

STREAMING_CHUNK:Defining the update job and permissions

update-data:
runs-on: ubuntu-latest
permissions:
contents: write

steps:
  # STREAMING_CHUNK:Checking out the code and setting up Python
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  # STREAMING_CHUNK:Executing the Python script to update data.json
  - name: Run update script
    run: python update_data.py

  # STREAMING_CHUNK:Committing and pushing the updated data to the repository
  - name: Commit and push changes
    run: |
      git config --global user.name 'github-actions[bot]'
      git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      git add data.json
      git diff --quiet && git diff --staged --quiet || (git commit -m "Update data.json" && git push)
